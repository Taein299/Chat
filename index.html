<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .qr-section {
            margin-bottom: 20px;
        }
        .qr-img {
            width: 150px;
            height: 150px;
            background: #eee;
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-section {
            display: none;
            text-align: left;
        }
        .game-status {
            background: #e9ecef;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }
        .btn-group {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }
        .btn-group button {
            flex: 1;
            padding: 6px;
            cursor: pointer;
        }
        .play-zone {
            background: #fff3cd;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            display: none;
        }
        .chat-window {
            height: 200px;
            border: 1px solid #ddd;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            background: #fafafa;
            border-radius: 5px;
        }
        .msg {
            margin-bottom: 8px;
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-block;
            clear: both;
            max-width: 80%;
        }
        .msg.me {
            background: #007bff;
            color: white;
            float: right;
        }
        .msg.other {
            background: #e2e2e2;
            color: black;
            float: left;
        }
        .system {
            color: #6c757d;
            text-align: center;
            font-size: 0.9em;
            margin: 5px 0;
            display: block;
            clear: both;
        }
        .input-group {
            display: flex;
            clear: both;
        }
        .input-group input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px 0 0 4px;
        }
        .input-group button {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-left: none;
            background: #007bff;
            color: white;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }
        #startBtn {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #startBtn:disabled {
            background: #6c757d;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="qrScreen" class="qr-section">
        <h2 id="qrTitle">술래잡기 방 만들기</h2>
        <p id="qrDesc">상대방 휴대폰으로 아래 QR 코드를 찍어줘</p>
        <img id="qrCode" class="qr-img" src="" alt="QR Code" style="display:none;">
    </div>

    <div id="gameScreen" class="chat-section">
        <div class="game-status">
            내 역할: <span id="myRole">선택 안 함</span>
            <div class="btn-group">
                <button onclick="selectRole('술래')">술래 하기</button>
                <button onclick="selectRole('도망자')">도망치기</button>
            </div>
        </div>

        <div id="playZone" class="play-zone">
            ⏱️ 남은 시간: <span id="timerText">05:00</span>
        </div>

        <button id="startBtn" onclick="clickStart()">게임 시작 누르기</button>
        
        <div id="chatWindow" class="chat-window"></div>
        
        <div class="input-group">
            <input type="text" id="msgInput" placeholder="메시지를 입력해..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">전송</button>
        </div>
    </div>
</div>

<script>
    let conn = null;
    let myReady = false;
    let otherReady = false;
    let gameTimer = null;
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');

    const makeId = () => Math.random().toString(36).substring(2, 9);

    if (!roomId) {
        const myRoomId = 'room-' + makeId();
        const peer = new Peer(myRoomId);

        peer.on('open', () => {
            const joinUrl = `${window.location.origin}${window.location.pathname}?room=${myRoomId}`;
            const qrImg = document.getElementById('qrCode');
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(joinUrl)}`;
            qrImg.style.display = 'block';
        });

        peer.on('connection', (c) => {
            conn = c;
            startConnection();
        });
    } else {
        document.getElementById('qrTitle').innerText = "방 접속 중...";
        document.getElementById('qrDesc').innerText = "상대방과 연결을 시도하고 있어.";
        
        const peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(roomId);
            conn.on('open', () => {
                startConnection();
            });
        });
    }

    function startConnection() {
        document.getElementById('qrScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        addSystemMsg("연결 성공. 역할 선택 후 게임 시작을 눌러줘.");

        conn.on('data', (data) => {
            if (data.type === 'chat') {
                addMsg(data.text, 'other');
            } else if (data.type === 'role') {
                addSystemMsg(`상대방이 역할을 [${data.role}](으)로 바꿨어.`);
            } else if (data.type === 'ready') {
                otherReady = true;
                addSystemMsg("상대방이 게임 시작을 눌렀어.");
                checkGameStart();
            }
        });
    }

    function selectRole(role) {
        document.getElementById('myRole').innerText = role;
        addSystemMsg(`내 역할을 [${role}](으)로 설정했어.`);
        if (conn) {
            conn.send({ type: 'role', role: role });
        }
    }

    // 게임 시작 버튼 클릭시 작동
    function clickStart() {
        myReady = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('startBtn').innerText = "상대방 대기 중...";
        addSystemMsg("내가 게임 시작을 눌렀어.");
        
        if (conn) {
            conn.send({ type: 'ready' });
        }
        checkGameStart();
    }

    // 둘 다 눌렀는지 확인
    function checkGameStart() {
        if (myReady && otherReady) {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('playZone').style.display = 'block';
            addSystemMsg("▶️ 둘 다 준비됨! 1번 놀이(술래잡기)를 시작해.");
            startTimer(300); // 5분 시작
        }
    }

    // 1번 놀이 타이머 기능
    function startTimer(duration) {
        let timer = duration, minutes, seconds;
        clearInterval(gameTimer);
        
        gameTimer = setInterval(() => {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);

            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById('timerText').innerText = minutes + ":" + seconds;

            if (--timer < 0) {
                clearInterval(gameTimer);
                addSystemMsg("⏱️ 게임 종료! 시간이 끝났어.");
            }
        }, 1000);
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'me');
        input.value = '';

        if (conn) {
            conn.send({ type: 'chat', text: text });
        }
    }

    function addMsg(text, sender) {
        const win = document.getElementById('chatWindow');
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function addSystemMsg(text) {
        const win = document.getElementById('chatWindow');
        const div = document.createElement('span');
        div.className = 'system';
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }
</script>

</body>
</html>
